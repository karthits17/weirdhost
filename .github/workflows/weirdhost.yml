name: Weirdhost Auto Renew (Sing-Box HY2)

on:
  workflow_dispatch:
  schedule:
    - cron: '45 23 * * *'  # 北京凌晨 07:45
    - cron: '4 13 * * *'  # 北京晚间 21:04

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg google-chrome-stable unzip xvfb libnss3 libatk-bridge2.0-0 libdrm2 libxkbcommon0 libgbm1 libasound2t64 libatspi2.0-0 libxshmfence1 fonts-liberation xfonts-75dpi xfonts-base

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage requests pydub SpeechRecognition PyNaCl

      - name: Setup Sing-Box Proxy
        run: |
          curl -L -o sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.10.1/sing-box-1.10.1-linux-amd64.tar.gz
          tar -xvf sing-box.tar.gz
          mv sing-box-1.10.1-linux-amd64/sing-box .
          chmod +x sing-box
          
          cat << 'EOF' > config.json
          ${{ secrets.XRAY_CONFIG_JSON }}
          EOF
          
          ./sing-box run -c config.json > xray_log.txt 2>&1 &
          echo "Sing-Box 穿透隧道已在后台成功启动 (SOCKS5 端口: 10808)"
          sleep 10

      - name: Run Renewal Script
        env:
          GH_TOKEN:               ${{ secrets.GH_TOKEN }}
          TG_BOT_TOKEN:           ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:             ${{ secrets.TG_CHAT_ID }}
          PROXY:                  "127.0.0.1:10808"
          # 自动注入多账号配置
          WEIRDHOST_COOKIE_1:       ${{ secrets.WEIRDHOST_COOKIE_1 }}
          WEIRDHOST_SERVER_URLS_1:  ${{ secrets.WEIRDHOST_SERVER_URLS_1 }}
          WEIRDHOST_COOKIE_2:       ${{ secrets.WEIRDHOST_COOKIE_2 }}
          WEIRDHOST_SERVER_URLS_2:  ${{ secrets.WEIRDHOST_SERVER_URLS_2 }}
          WEIRDHOST_COOKIE_3:       ${{ secrets.WEIRDHOST_COOKIE_3 }}
          WEIRDHOST_SERVER_URLS_3:  ${{ secrets.WEIRDHOST_SERVER_URLS_3 }}
          WEIRDHOST_COOKIE_4:       ${{ secrets.WEIRDHOST_COOKIE_4 }}
          WEIRDHOST_SERVER_URLS_4:  ${{ secrets.WEIRDHOST_SERVER_URLS_4 }}
          WEIRDHOST_COOKIE_5:       ${{ secrets.WEIRDHOST_COOKIE_5 }}
          WEIRDHOST_SERVER_URLS_5:  ${{ secrets.WEIRDHOST_SERVER_URLS_5 }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" python main.py

      - name: Upload Debug Artifacts (Always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs-and-screenshots
          path: |
            *.png
            xray_log.txt
          retention-days: 3

      - name: Update Next Schedule
        if: always()
        env:
          TRIGGERED_CRON: ${{ github.event.schedule }}
        run: |
          python - << 'PYEOF'
          import random, re, os
          triggered = os.environ.get("TRIGGERED_CRON", "").strip()
          yml_path = ".github/workflows/weirdhost.yml"
          with open(yml_path, "r", encoding="utf-8") as f: content = f.read()

          def gen_cron(bj_start, bj_end):
              bj_h, bj_m = random.randint(bj_start, bj_end - 1), random.randint(0, 59)
              return f"{bj_m} {(bj_h - 8) % 24} * * *", bj_h, bj_m

          is_evening = False
          if triggered:
              try: is_evening = (10 <= int(triggered.split()[1]) <= 14)
              except: pass

          if is_evening:
              new_cron, bj_h, bj_m = gen_cron(18, 23)
              content = re.sub(r"(    - cron: '[^']*'[^\n]*# 北京晚间[^\n]*)", f"    - cron: '{new_cron}'  # 北京晚间 {bj_h:02d}:{bj_m:02d}", content, count=1)
          else:
              new_cron, bj_h, bj_m = gen_cron(1, 8)
              content = re.sub(r"(    - cron: '[^']*'[^\n]*# 北京凌晨[^\n]*)", f"    - cron: '{new_cron}'  # 北京凌晨 {bj_h:02d}:{bj_m:02d}", content, count=1)

          with open(yml_path, "w", encoding="utf-8") as f: f.write(content)
          PYEOF

      - name: Commit and Push Updated Schedule
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/weirdhost.yml
          git diff --cached --quiet && echo "无变化，跳过提交" && exit 0
          git commit -m "chore: 自动更新下次运行时间 [skip ci]"
          git push
